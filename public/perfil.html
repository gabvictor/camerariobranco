<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/icone.png" type="image/png">
    <title>Meu Perfil | CamRB</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <script src="/script/theme.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">
    
    <div id="content-wrapper" class="pb-24">
        <div class="container mx-auto px-4 py-8 max-w-2xl">
            <header class="mb-8">
                <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight mb-2">Meu Perfil</h1>
                <p class="text-gray-500 dark:text-gray-400">Gerencie suas preferências e favoritos.</p>
            </header>

            <!-- Settings Section -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden mb-6">
                <div class="p-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-lg flex items-center gap-2">
                        <i data-lucide="settings" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                        Configurações
                    </h2>
                </div>
                
                <div class="p-4 space-y-4">
                    <!-- Theme Toggle -->
                    <div class="flex items-center justify-between">
                        <div class="flex items-center gap-3">
                            <div class="p-2 bg-gray-100 dark:bg-gray-700 rounded-lg">
                                <i data-lucide="moon" class="w-5 h-5 text-gray-600 dark:text-gray-300"></i>
                            </div>
                            <div>
                                <p class="font-medium">Modo Escuro</p>
                                <p class="text-sm text-gray-500">Alternar entre tema claro e escuro</p>
                            </div>
                        </div>
                        <button id="theme-toggle-switch" class="relative inline-flex h-6 w-11 items-center rounded-full transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:ring-offset-2 bg-gray-200 dark:bg-indigo-600">
                            <span class="sr-only">Ativar modo escuro</span>
                            <span id="theme-toggle-thumb" class="inline-block h-4 w-4 transform rounded-full bg-white transition-transform translate-x-1 dark:translate-x-6"></span>
                        </button>
                    </div>

                    <!-- Admin Link (Hidden by default) -->
                    <div id="admin-section" class="hidden border-t border-gray-100 dark:border-gray-700 pt-4 mt-4">
                        <a href="/admin.html" class="flex items-center justify-between w-full group">
                            <div class="flex items-center gap-3">
                                <div class="p-2 bg-indigo-100 dark:bg-indigo-900/30 rounded-lg">
                                    <i data-lucide="shield" class="w-5 h-5 text-indigo-600 dark:text-indigo-400"></i>
                                </div>
                                <div>
                                    <p class="font-medium text-indigo-600 dark:text-indigo-400">Painel Administrativo</p>
                                    <p class="text-sm text-gray-500">Gerenciar câmeras e configurações</p>
                                </div>
                            </div>
                            <i data-lucide="chevron-right" class="w-5 h-5 text-gray-400 group-hover:text-indigo-600 transition-colors"></i>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Favorites Section -->
            <div class="bg-white dark:bg-gray-800 rounded-xl shadow-sm border border-gray-100 dark:border-gray-700 overflow-hidden">
                <div class="p-4 border-b border-gray-100 dark:border-gray-700">
                    <h2 class="font-semibold text-lg flex items-center gap-2">
                        <i data-lucide="star" class="w-5 h-5 text-yellow-500"></i>
                        Câmeras Favoritas
                    </h2>
                </div>
                <div id="favorites-list" class="divide-y divide-gray-100 dark:divide-gray-700">
                    <div class="p-8 text-center text-gray-500">
                        <div class="loader mb-4"></div>
                        <p>Carregando favoritos...</p>
                    </div>
                </div>
            </div>

            <div class="mt-8 text-center">
                 <button id="logout-btn" class="text-red-500 hover:text-red-700 font-medium text-sm flex items-center justify-center gap-2 mx-auto hidden">
                    <i data-lucide="log-out" class="w-4 h-4"></i>
                    Sair da conta
                </button>
                <a href="/login.html" id="login-link" class="text-indigo-600 hover:text-indigo-800 font-medium text-sm flex items-center justify-center gap-2 mx-auto hidden">
                    <i data-lucide="log-in" class="w-4 h-4"></i>
                    Fazer Login
                </a>
            </div>
        </div>

        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav sm:hidden">
            <a href="/" class="nav-item">
                <i data-lucide="home"></i>
                <span>Início</span>
            </a>
            <a href="/mapa.html" class="nav-item">
                <i data-lucide="map"></i>
                <span>Mapa</span>
            </a>
            <a href="https://github.com/gabvictor/CamRB" target="_blank" class="nav-item">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-6 shadow-lg border-4 border-gray-100 dark:border-gray-900">
                    <i data-lucide="github" class="w-5 h-5"></i>
                </div>
                <span class="font-semibold text-indigo-600 dark:text-indigo-400">App</span>
            </a>
            <a href="/#search-input" class="nav-item">
                <i data-lucide="search"></i>
                <span>Buscar</span>
            </a>
            <a href="/perfil.html" class="nav-item active">
                <i data-lucide="user"></i>
                <span>Perfil</span>
            </a>
        </nav>
    </div>

    <script type="module" src="/script/perfil-script.js"></script>
</body>
</html>
