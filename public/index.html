<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="/assets/icone.png" type="image/png">
    <title>Câmeras ao Vivo de Rio Branco | CamRB</title>
    
    <!-- Meta Tags SEO -->
    <meta name="description" content="🔴 AO VIVO: Veja agora o trânsito e câmeras de segurança em Rio Branco - Acre. Imagens em tempo real, mapa interativo e monitoramento 24h. Acesse grátis!">
    <meta name="keywords" content="Rio Branco, Câmeras ao vivo, Trânsito Agora, Segurança, Acre, Webcams, Monitoramento, CamRB, Ao Vivo">
    <meta name="author" content="CamRB - Gabriel Victor">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://cameras.riobranco.ac.gov.br/">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cameras.riobranco.ac.gov.br/">
    <meta property="og:title" content="Câmeras ao Vivo de Rio Branco | CamRB">
    <meta property="og:description" content="🔴 AO VIVO: Veja agora o trânsito e câmeras de segurança em Rio Branco - Acre. Imagens em tempo real.">
    <meta property="og:image" content="https://cameras.riobranco.ac.gov.br/assets/icone.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://cameras.riobranco.ac.gov.br/">
    <meta property="twitter:title" content="Câmeras ao Vivo de Rio Branco | CamRB">
    <meta property="twitter:description" content="🔴 AO VIVO: Veja agora o trânsito e câmeras de segurança em Rio Branco - Acre.">
    <meta property="twitter:image" content="https://cameras.riobranco.ac.gov.br/assets/icone.png">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "CamRB - Câmeras Rio Branco",
      "url": "https://cameras.riobranco.ac.gov.br/",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://cameras.riobranco.ac.gov.br/?search={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/global.css">
    <script src="/script/theme.js"></script>
</head>
<body class="bg-white dark:bg-gray-900 text-gray-800 dark:text-gray-200 transition-colors duration-300">
    
    <div id="content-wrapper" style="display: none;">
        <!-- Bottom Navigation (Mobile) -->
        <nav class="bottom-nav sm:hidden">
            <a href="/" class="nav-item active">
                <i data-lucide="home"></i>
                <span>Início</span>
            </a>
            <a href="/mapa.html" class="nav-item">
                <i data-lucide="map"></i>
                <span>Mapa</span>
            </a>
            <a href="https://github.com/gabvictor/CamRB" target="_blank" class="nav-item">
                <div class="bg-indigo-600 text-white p-2 rounded-full -mt-6 shadow-lg border-4 border-gray-100 dark:border-gray-900">
                    <i data-lucide="github" class="w-5 h-5"></i>
                </div>
                <span class="font-semibold text-indigo-600 dark:text-indigo-400">App</span>
            </a>
            <a href="#" id="mobile-search-trigger" class="nav-item">
                <i data-lucide="search"></i>
                <span>Buscar</span>
            </a>
            <a href="/perfil.html" class="nav-item">
                <i data-lucide="user"></i>
                <span>Perfil</span>
            </a>
        </nav>

        <div id="update-progress-bar-container"><div id="update-progress-bar"></div></div>
        <div id="camera-modal" class="fixed inset-0 bg-black bg-opacity-80 z-50 hidden flex items-center justify-center p-4 md:p-6 transition-opacity duration-300">
            <div class="bg-white dark:bg-gray-800 rounded-lg shadow-2xl w-full max-w-7xl max-h-[95vh] relative transform scale-95 transition-transform duration-300 grid grid-rows-[auto_1fr]">
                <div class="p-4 border-b dark:border-gray-700 flex justify-between items-center">
                    <h3 id="modal-title" class="text-lg font-semibold">Câmera</h3>
                    <button id="close-modal" aria-label="Fechar modal" class="p-2 -mr-2 rounded-full text-gray-500 hover:bg-gray-200 dark:hover:bg-gray-700 dark:hover:text-white"><i data-lucide="x" class="w-6 h-6"></i></button>
                </div>
                <div class="relative min-h-0 p-4 bg-black/10 dark:bg-black/20 flex items-center justify-center">
                    <img id="modal-camera-feed" src="" alt="Visualização da Câmera" class="max-w-full max-h-full object-contain bg-black rounded-md">
                    <div id="modal-loader" class="absolute"><div class="loader"></div></div>
                    <button id="modal-prev" aria-label="Câmera anterior" class="absolute left-6 md:left-8 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75 transition-opacity disabled:opacity-25 disabled:cursor-not-allowed"><i data-lucide="chevron-left" class="w-8 h-8"></i></button>
                    <button id="modal-next" aria-label="Próxima câmera" class="absolute right-6 md:right-8 top-1/2 -translate-y-1/2 bg-black bg-opacity-50 text-white p-2 rounded-full hover:bg-opacity-75 transition-opacity disabled:opacity-25 disabled:cursor-not-allowed"><i data-lucide="chevron-right" class="w-8 h-8"></i></button>
                </div>
            </div>
        </div>
        <div class="container mx-auto px-4 py-8">
            <header class="flex flex-col sm:flex-row justify-between items-center mb-6 gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-gray-900 dark:text-white tracking-tight">Câmeras de Rio Branco</h1>
                    <p class="text-gray-500 dark:text-gray-400 mt-1">Bem-vindo(a), <span id="username-display" class="font-semibold text-indigo-600 dark:text-indigo-400">Visitante</span>!</p>
                </div>
                <div class="flex items-center gap-2 sm:gap-4">
                    <span id="last-updated" class="text-xs text-gray-400 whitespace-nowrap hidden sm:inline"></span>
                    <a href="/mapa.html" title="Ver no mapa" class="p-2.5 rounded-full bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition-all hover:text-indigo-600 dark:text-gray-200"><i data-lucide="map" class="w-5 h-5"></i></a>
                    <a id="dashboard-link" href="/dashboard.html" title="Dashboard" class="p-2.5 rounded-full bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition-all hidden text-indigo-600">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i>
                    </a>
                    <button id="toggle-theme" title="Alternar tema" class="p-2.5 rounded-full bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition-all text-gray-700 dark:text-gray-200"><i data-lucide="sun" class="w-5 h-5 block dark:hidden"></i><i data-lucide="moon" class="w-5 h-5 hidden dark:block"></i></button>
                    <button id="logout-btn" title="Sair" class="p-2.5 rounded-full bg-white dark:bg-gray-800 shadow-sm hover:shadow-md transition-all text-red-500 hover:bg-red-50 dark:hover:bg-red-900/20"><i data-lucide="log-out" class="w-5 h-5"></i></button>
                </div>
            </header>

            <!-- App Download Banner -->
            <div class="bg-gradient-to-r from-indigo-600 to-purple-600 rounded-xl p-4 mb-8 shadow-lg text-white flex flex-col sm:flex-row items-center justify-between gap-4 transform transition-all hover:scale-[1.01]">
                <div class="flex items-center gap-4">
                    <div class="bg-white/20 p-3 rounded-lg backdrop-blur-sm">
                        <i data-lucide="github" class="w-8 h-8 text-white"></i>
                    </div>
                    <div>
                        <h2 class="font-bold text-lg">Baixe o App Oficial</h2>
                        <p class="text-indigo-100 text-sm">Acesso mais rápido, notificações e mapa exclusivo.</p>
                    </div>
                </div>
                <a href="https://github.com/gabvictor/CamRB" target="_blank" class="px-6 py-2 bg-white text-indigo-600 font-bold rounded-lg shadow hover:bg-indigo-50 transition-colors whitespace-nowrap">
                    Ver no GitHub
                </a>
            </div>

            <div class="mb-6 p-4 bg-white dark:bg-gray-800 rounded-lg shadow-sm space-y-4 border border-gray-100 dark:border-gray-700">
                <div class="relative"><i data-lucide="search" class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400 pointer-events-none"></i><input type="text" id="search-input" placeholder="Buscar por nome da câmera..." class="w-full pl-10 pr-4 py-2 border rounded-md dark:bg-gray-700 dark:border-gray-600 focus:ring-2 focus:ring-indigo-500 focus:outline-none"></div>
                <div id="filters-container" class="space-y-3">
                    <div class="flex flex-wrap items-center gap-x-4 gap-y-2"><span class="font-semibold text-sm">Status:</span><div id="status-filters" class="flex flex-wrap gap-2"><button data-filter-group="status" data-filter="online" class="filter-btn active-filter">Online (<span id="count-online">0</span>)</button><button data-filter-group="status" data-filter="all" class="filter-btn">Todas (<span id="count-all">0</span>)</button><button data-filter-group="status" data-filter="offline" class="filter-btn">Offline (<span id="count-offline">0</span>)</button><button data-filter-group="status" data-filter="favorites" class="filter-btn">Favoritas (<span id="count-favorites">0</span>)</button></div></div>
                    <div class="border-t border-gray-200 dark:border-gray-700 pt-3">
                        <button id="category-toggle-btn" class="flex items-center justify-between w-full text-left font-semibold text-sm py-1"><span>Categorias</span><i data-lucide="chevron-down" id="category-toggle-icon" class="w-5 h-5 transition-transform"></i></button>
                        <div id="category-filters-container" class="mt-2 hidden"><div id="category-filters" class="flex flex-wrap gap-2"></div></div>
                    </div>
                </div>
            </div>
            <main id="camera-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-6 min-h-[500px]"></main>
            <div id="initial-loader" class="text-center py-20"><div class="loader mx-auto"></div><p class="mt-4 text-gray-500">A carregar câmaras...</p></div>
            <div id="no-results" class="text-center py-20 hidden col-span-full"><i data-lucide="camera-off" class="w-16 h-16 mx-auto mb-4 text-gray-400"></i><p class="text-gray-500">Nenhuma câmara encontrada.</p></div>
            <div id="pagination-controls" class="flex justify-center items-center mt-8 space-x-2"></div>
            <footer class="text-center mt-12 text-sm text-gray-500">
                <p>🔗 Projeto experimental - Câmaras Rio Branco</p>
                <a id="admin-link" href="/admin.html" class="hover:underline mt-2 hidden">Admin</a>
            </footer>
        </div>
    </div>

    <script type="module" src="/script/index-script.js"></script>
</body>
</html>
